<!DOCTYPE html>
	<head>
		<title>Lecture 9.3 Exercise Solution</title>
		<script type="text/javascript">
				var day1=prompt("First day of the week- Sa Su M");
				var day = prompt( "Day Number-" );
				switch(day1){
					case "Sa":switch(day){
								case "1":alert("Day: Saturday")
										break;
								case "2":alert("Day: Sunday")
										break;
								case "3":alert("Day: Monday")
										break;
								case "4":alert("Day: Tuesday")
										break;
								case "5":alert("Day: Wednesday")
										break;
								case "6":alert("Day: Thursday")
										break;
								case "7":alert("Day: Friday")
										break;
								default:alert("Number not in between 1-7")
										break;
								}
							break;
					case "Su":switch(day){	
								case "1":alert("Day: Sunday")
										break;
								case "2":alert("Day: Monday")
										break;
								case "3":alert("Day: Tuesday")
										break;
								case "4":alert("Day: Wednesday")
										break;
								case "5":alert("Day: Thursday")
										break;
								case "6":alert("Day: Friday")
										break;
								case "7":alert("Day: Saturday")
										break;
								default:alert("Number not in between 1-7")
										break;
								}
							break;
					case "M":switch(day){	
								case "1":alert("Day: Monday")
										break;
								case "2":alert("Day: Tuesday")
										break;
								case "3":alert("Day: Wednesday")
										break;
								case "4":alert("Day: Thursday")
										break;
								case "5":alert("Day: Friday")
										break;
								case "6":alert("Day: Saturday")
										break;
								case "7":alert("Day: Sunday")
										break;
								default:alert("Number not in between 1-7")
										break;
								}
							break;
					default:alert("Does not match day options given")
							break;
					}
		</script>
	</head>
	<body>
	</body>
</html>
